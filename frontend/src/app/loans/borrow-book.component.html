<h2>Emprunter un livre</h2>

<form (ngSubmit)="borrow()">
  <div>
    <label for="memberId">Membre (ID)</label>
    <input id="memberId" name="memberId" type="text" [(ngModel)]="memberId" required />
  </div>

  <div>
    <label for="bookId">Livre</label>
    <select id="bookId" name="bookId" [(ngModel)]="selectedBookId" required>
      <option value="" disabled>Sélectionner un livre</option>
      @for (book of availableBooks; track book.id) {
        <option [value]="book.id">{{ book.title }} — {{ book.author }}</option>
      }
    </select>
  </div>

  <button type="submit" [disabled]="!memberId || !selectedBookId">Emprunter</button>
</form>

@if (errorMessage) {
  <p class="error" role="alert">{{ errorMessage }}</p>
}

@if (successMessage) {
  <p class="success">{{ successMessage }}</p>
}
