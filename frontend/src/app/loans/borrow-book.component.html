<section class="page-section">
  <h2 class="page-title">Emprunter un livre</h2>

  <form (ngSubmit)="borrow()" class="space-y-4">
    <div class="space-y-1">
      <label for="memberId" class="field-label">Membre (ID)</label>
      <input
        id="memberId"
        name="memberId"
        type="text"
        [(ngModel)]="memberId"
        required
        class="field-input"
      />
    </div>

    <div class="space-y-1">
      <label for="bookId" class="field-label">Livre</label>
      @if (loadingBooks) {
        <div class="skeleton-block h-9 w-full" aria-busy="true" aria-label="Chargement des livres"></div>
      } @else {
        <select
          id="bookId"
          name="bookId"
          [(ngModel)]="selectedBookId"
          required
          class="field-input"
        >
          <option value="" disabled>Sélectionner un livre</option>
          @for (book of availableBooks; track book.id) {
            <option [value]="book.id">{{ book.title }} — {{ book.author }}</option>
          }
        </select>
      }
    </div>

    <button type="submit" [disabled]="!memberId || !selectedBookId || submitting" class="btn-primary">
      @if (submitting) {
        <span class="spinner" aria-hidden="true"></span>
        <span>Emprunt en cours…</span>
      } @else {
        <span>Emprunter</span>
      }
    </button>
  </form>

  @if (errorMessage) {
    <p class="state-error" role="alert">{{ errorMessage }}</p>
  }

  @if (successMessage) {
    <p class="state-success">{{ successMessage }}</p>
  }
</section>
